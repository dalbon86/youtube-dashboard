<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 채널 성과 현황</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --white: #ffffff;
      --border: #e8e8e4;
      --text: #111110;
      --muted: #999990;
      --up: #1a6b3c;
      --up-bg: #e8f5ee;
      --down: #c0392b;
      --down-bg: #fdecea;
      --accent: #ff3b30;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px;
    }
    .header-title { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .last-updated { font-size: 12px; color: var(--muted); }
    .refresh-btn {
      font-size: 12px; color: var(--muted);
      background: #f0f0ee; border: none; border-radius: 6px;
      padding: 6px 12px; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: var(--border); }

    /* MONTH TABS */
    .month-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    .month-tab {
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .month-tab:hover { color: var(--text); }
    .month-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* MAIN */
    main { padding: 32px 40px; max-width: 1200px; margin: 0 auto; }

    /* LOADING */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 300px; gap: 16px; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* CHANNEL GRID */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) { .channel-grid { grid-template-columns: 1fr; } }

    /* CHANNEL CARD */
    .channel-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.4s ease forwards;
    }
    .channel-card:nth-child(2) { animation-delay: 0.08s; }
    .channel-card:nth-child(3) { animation-delay: 0.16s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .channel-name {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    /* METRIC BLOCK */
    .metric-block {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .metric-block:last-child { border-bottom: none; padding-bottom: 0; }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .metric-main {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .metric-value {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1;
    }
    .metric-change {
      font-size: 13px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
    }
    .metric-change.up { color: var(--up); background: var(--up-bg); }
    .metric-change.down { color: var(--down); background: var(--down-bg); }
    .metric-change.neutral { color: var(--muted); background: #f0f0ee; }

    /* UPLOAD BADGES */
    .upload-badges {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .badge.long { background: #eef2ff; color: #3730a3; }
    .badge.short { background: #fff7ed; color: #c2410c; }

    /* MINI CHART */
    .mini-chart-wrap { height: 64px; position: relative; }

    /* NO DATA */
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ERROR */
    .error-box {
      background: var(--down-bg);
      border: 1px solid #f5c6c2;
      border-radius: 12px;
      padding: 20px 24px;
      color: var(--down);
      font-size: 14px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">▶</div>
    <div>
      <div class="header-title">유튜브 채널 성과 현황</div>
      <div class="header-sub">스튜디오지니 · 스밍스 · 쇼숏</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">불러오는 중...</span>
    <button class="refresh-btn" onclick="loadData()">↺ 새로고침</button>
  </div>
</header>

<div class="month-bar" id="monthBar"></div>

<main id="main">
  <div class="loading">
    <div class="spinner"></div>
    <div>Google Sheets에서 데이터를 불러오는 중...</div>
  </div>
</main>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyFBNZzA4Ght-y8QuCJOhYcj2nGqtrbFhAzTTXdMzk37lGTKpdI_aBlyBVWn_STnsjyDHef5MtfFJ3/pub?output=csv";
  const CHANNELS = ["스튜디오지니", "스밍스", "쇼숏"];

  let allData = [];
  let selectedMonth = null;
  let charts = {};

  // 월 정렬 순서
  const MONTH_ORDER = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  function formatViews(v) {
    if (v >= 100000000) return (v / 100000000).toFixed(1) + "억";
    if (v >= 10000) return (v / 10000).toFixed(0) + "만";
    if (v >= 1000) return (v / 1000).toFixed(1) + "천";
    return v.toLocaleString();
  }

  function calcChange(curr, prev) {
    if (prev === 0 || prev === null || prev === undefined) return null;
    return ((curr - prev) / Math.abs(prev)) * 100;
  }

  function changeHtml(pct) {
    if (pct === null) return '<span class="metric-change neutral">-</span>';
    const cls = pct >= 0 ? "up" : "down";
    const arrow = pct >= 0 ? "▲" : "▼";
    return `<span class="metric-change ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</span>`;
  }

  function getMonths() {
    const months = [...new Set(allData.map(r => r.월))];
    return months.sort((a, b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));
  }

  function getPrev(channel, month, key) {
    const months = getMonths();
    const idx = months.indexOf(month);
    if (idx <= 0) return null;
    const prevMonth = months[idx - 1];
    const row = allData.find(r => r.채널 === channel && r.월 === prevMonth);
    return row ? Number(row[key]) : null;
  }

  function getHistory(channel, key) {
    const months = getMonths();
    return months.map(m => {
      const row = allData.find(r => r.채널 === channel && r.월 === m);
      return row ? Number(row[key]) : null;
    }).filter(v => v !== null);
  }

  function destroyCharts() {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};
  }

  function renderMiniChart(canvasId, data, color) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    const months = getMonths().slice(-data.length);
    charts[canvasId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: months,
        datasets: [{
          data,
          borderColor: color,
          borderWidth: 2,
          pointBackgroundColor: color,
          pointRadius: 3,
          tension: 0.3,
          fill: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y?.toLocaleString()
            }
          }
        },
        scales: {
          x: { display: true, ticks: { font: { size: 10 }, color: '#bbb' }, grid: { display: false }, border: { display: false } },
          y: { display: false }
        }
      }
    });
  }

  function renderChannelCard(channel, month) {
    const row = allData.find(r => r.채널 === channel && r.월 === month);
    if (!row) {
      return `
        <div class="channel-card">
          <div class="channel-name">${channel}</div>
          <div class="no-data">이 달 데이터가 없어요</div>
        </div>`;
    }

    const longVal = Number(row.롱폼);
    const shortVal = Number(row.숏폼);
    const totalUpload = longVal + shortVal;
    const views = Number(row.조회수);

    const prevUpload = (() => {
      const pl = getPrev(channel, month, "롱폼");
      const ps = getPrev(channel, month, "숏폼");
      return (pl !== null && ps !== null) ? pl + ps : null;
    })();
    const prevViews = getPrev(channel, month, "조회수");

    const uploadChange = prevUpload !== null ? calcChange(totalUpload, prevUpload) : null;
    const viewsChange = prevViews !== null ? calcChange(views, prevViews) : null;

    const uploadHistory = getHistory(channel, "롱폼").map((v, i) => v + (getHistory(channel, "숏폼")[i] || 0));
    const viewsHistory = getHistory(channel, "조회수");

    const uid = channel.replace(/\s/g, "");

    return `
      <div class="channel-card">
        <div class="channel-name">${channel}</div>

        <div class="metric-block">
          <div class="metric-label">업로드 건수</div>
          <div class="metric-main">
            <span class="metric-value">${totalUpload}건</span>
            ${changeHtml(uploadChange)}
          </div>
          <div class="upload-badges">
            <span class="badge long">롱폼 ${longVal}</span>
            <span class="badge short">숏폼 ${shortVal}</span>
          </div>
          <div class="mini-chart-wrap">
            <canvas id="upload-${uid}"></canvas>
          </div>
        </div>

        <div class="metric-block">
          <div class="metric-label">조회수</div>
          <div class="metric-main">
            <span class="metric-value">${formatViews(views)}</span>
            ${changeHtml(viewsChange)}
          </div>
          <div class="mini-chart-wrap">
            <canvas id="views-${uid}"></canvas>
          </div>
        </div>
      </div>`;
  }

  function render() {
    destroyCharts();
    const months = getMonths();
    if (!months.length) {
      document.getElementById("main").innerHTML = '<div class="no-data">데이터가 없어요. Google Sheets를 확인해주세요.</div>';
      return;
    }

    if (!selectedMonth || !months.includes(selectedMonth)) {
      selectedMonth = months[months.length - 1];
    }

    // Month tabs
    const monthBar = document.getElementById("monthBar");
    monthBar.innerHTML = months.map(m =>
      `<button class="month-tab ${m === selectedMonth ? 'active' : ''}" onclick="selectMonth('${m}')">${m}</button>`
    ).join("");

    // Cards
    const main = document.getElementById("main");
    main.innerHTML = `<div class="channel-grid">${CHANNELS.map(ch => renderChannelCard(ch, selectedMonth)).join("")}</div>`;

    // Draw charts
    requestAnimationFrame(() => {
      CHANNELS.forEach(channel => {
        const uid = channel.replace(/\s/g, "");
        const uploadHistory = getHistory(channel, "롱폼").map((v, i) => v + (getHistory(channel, "숏폼")[i] || 0));
        const viewsHistory = getHistory(channel, "조회수");
        renderMiniChart(`upload-${uid}`, uploadHistory, "#6366f1");
        renderMiniChart(`views-${uid}`, viewsHistory, "#f59e0b");
      });
    });

    // Last updated
    document.getElementById("lastUpdated").textContent = `마지막 업데이트: ${new Date().toLocaleString("ko-KR", { month: "long", day: "numeric", hour: "2-digit", minute: "2-digit" })}`;
  }

  function selectMonth(month) {
    selectedMonth = month;
    render();
  }

  function loadData() {
    document.getElementById("main").innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>Google Sheets에서 데이터를 불러오는 중...</div>
      </div>`;
    document.getElementById("monthBar").innerHTML = "";

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        allData = results.data.map(row => ({
          월: row["월"]?.trim(),
          채널: row["채널"]?.trim(),
          롱폼: Number(row["롱폼"]) || 0,
          숏폼: Number(row["숏폼"]) || 0,
          조회수: Number(row["조회수"]) || 0,
        })).filter(r => r.월 && r.채널);
        render();
      },
      error: (err) => {
        document.getElementById("main").innerHTML = `
          <div class="error-box">
            ⚠️ 데이터를 불러오지 못했어요. Google Sheets 공개 설정을 확인해주세요.<br/>
            <small style="opacity:0.7;margin-top:6px;display:block;">${err.message}</small>
          </div>`;
      }
    });
  }

  loadData();
</script>
</body>
</html>
