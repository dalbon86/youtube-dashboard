<!DOCTYPE html>
<!-- v3 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 채널 성과 현황</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f5; --white: #ffffff; --border: #e8e8e4; --text: #111110; --muted: #999990;
      --up: #1a6b3c; --up-bg: #e8f5ee; --down: #c0392b; --down-bg: #fdecea; --accent: #ff3b30;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .header-title { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .refresh-btn { font-size: 12px; color: var(--muted); background: #f0f0ee; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-family: inherit; }
    main { padding: 32px 40px; max-width: 1200px; margin: 0 auto; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 16px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .channel-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; }
    .channel-name { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .metric-block { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .metric-block:last-child { border-bottom: none; padding-bottom: 0; }
    .metric-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .metric-main { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
    .metric-value { font-size: 30px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; }
    .metric-change { font-size: 13px; font-weight: 700; padding: 3px 8px; border-radius: 5px; }
    .metric-change.up { color: var(--up); background: var(--up-bg); }
    .metric-change.down { color: var(--down); background: var(--down-bg); }
    .upload-badges { display: flex; gap: 6px; margin-bottom: 12px; }
    .badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
    .badge.long { background: #eef2ff; color: #3730a3; }
    .badge.short { background: #fff7ed; color: #c2410c; }
    .mini-chart-wrap { height: 100px; position: relative; }
    .no-data { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .last-updated { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">▶</div>
    <div>
      <div class="header-title">유튜브 채널 성과 현황</div>
      <div class="header-sub">스튜디오지니 · 스밍스 · 쇼숏</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadData()">↺ 새로고침</button>
  </div>
</header>
<div style="background:#fff;border-bottom:1px solid #e8e8e4;padding:0 40px;">
  <div style="display:inline-block;padding:14px 0;font-size:13px;font-weight:700;color:#111;border-bottom:2px solid #ff3b30;">3개월 비교</div>
</div>
<main id="main">
  <div class="loading"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>
</main>
<script>
  Chart.register(ChartDataLabels);
  const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyFBNZzA4Ght-y8QuCJOhYcj2nGqtrbFhAzTTXdMzk37lGTKpdI_aBlyBVWn_STnsjyDHef5MtfFJ3/pub?output=csv";
  const CSV_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(SHEETS_URL);
  const CHANNELS = ["스튜디오지니","스밍스","쇼숏"];
  const MONTH_ORDER = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  let allData = [], charts = {};
  function getMonths() { return [...new Set(allData.map(r=>r.월))].sort((a,b)=>MONTH_ORDER.indexOf(a)-MONTH_ORDER.indexOf(b)); }
  function getHistory(ch,key) { return getMonths().map(m=>{ const r=allData.find(r=>r.채널===ch&&r.월===m); return r?Number(r[key])||0:0; }); }
  function calcChange(arr) { if(arr.length<2)return null; const p=arr[arr.length-2],c=arr[arr.length-1]; if(!p)return null; return((c-p)/Math.abs(p))*100; }
  function changeHtml(pct) { if(pct===null)return'<span class="metric-change neutral">-</span>'; const cls=pct>=0?"up":"down",arrow=pct>=0?"▲":"▼"; return`<span class="metric-change ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</span>`; }
  function fmtViews(v) { if(v>=100000000)return(v/100000000).toFixed(1)+"억"; if(v>=10000)return(v/10000).toFixed(0)+"만"; return v.toLocaleString(); }
  function destroyCharts() { Object.values(charts).forEach(c=>c.destroy()); charts={}; }
  function drawChart(id,data,color,fmt) {
    const ctx=document.getElementById(id); if(!ctx)return;
    charts[id]=new Chart(ctx,{
      type:"line",
      data:{labels:getMonths(),datasets:[{data,borderColor:color,borderWidth:2.5,pointBackgroundColor:color,pointRadius:5,tension:0.3,fill:false}]},
      options:{
        responsive:true,maintainAspectRatio:false,
        layout:{padding:{top:28,left:10,right:10}},
        plugins:{
          legend:{display:false},tooltip:{enabled:false},
          datalabels:{display:true,color:color,backgroundColor:"rgba(255,255,255,0.85)",borderRadius:4,padding:{top:2,bottom:2,left:5,right:5},font:{size:12,weight:"700"},align:"top",anchor:"end",offset:4,formatter:fmt}
        },
        scales:{x:{ticks:{font:{size:11},color:"#bbb"},grid:{display:false},border:{display:false}},y:{display:false,grace:"50%"}}
      }
    });
  }
  function renderCards() {
    destroyCharts();
    const months=getMonths();
    if(!months.length){document.getElementById("main").innerHTML='<div class="no-data">데이터가 없어요.</div>';return;}
    const html=`<div class="channel-grid">${CHANNELS.map(ch=>{
      const longH=getHistory(ch,"롱폼"),shortH=getHistory(ch,"숏폼"),totalH=longH.map((v,i)=>v+shortH[i]),viewsH=getHistory(ch,"조회수");
      const uid=ch.replace(/\s/g,"");
      return`<div class="channel-card">
        <div class="channel-name">${ch}</div>
        <div class="metric-block">
          <div class="metric-label">업로드 건수</div>
          <div class="metric-main"><span class="metric-value">${totalH[totalH.length-1]}건</span>${changeHtml(calcChange(totalH))}</div>
          <div class="upload-badges"><span class="badge long">롱폼 ${longH[longH.length-1]}</span><span class="badge short">숏폼 ${shortH[shortH.length-1]}</span></div>
          <div class="mini-chart-wrap"><canvas id="u-${uid}"></canvas></div>
        </div>
        <div class="metric-block">
          <div class="metric-label">조회수</div>
          <div class="metric-main"><span class="metric-value">${fmtViews(viewsH[viewsH.length-1])}</span>${changeHtml(calcChange(viewsH))}</div>
          <div class="mini-chart-wrap"><canvas id="v-${uid}"></canvas></div>
        </div>
      </div>`;
    }).join("")}</div>`;
    document.getElementById("main").innerHTML=html;
    requestAnimationFrame(()=>{
      CHANNELS.forEach(ch=>{
        const uid=ch.replace(/\s/g,"");
        const longH=getHistory(ch,"롱폼"),shortH=getHistory(ch,"숏폼"),totalH=longH.map((v,i)=>v+shortH[i]),viewsH=getHistory(ch,"조회수");
        drawChart(`u-${uid}`,totalH,"#6366f1",v=>v);
        drawChart(`v-${uid}`,viewsH,"#f59e0b",v=>fmtViews(v));
      });
    });
    document.getElementById("lastUpdated").textContent=`마지막 업데이트: ${new Date().toLocaleString("ko-KR",{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})}`;
  }
  function loadData() {
    document.getElementById("main").innerHTML='<div class="loading"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>';
    Papa.parse(CSV_URL,{download:true,header:true,skipEmptyLines:true,
      complete:(results)=>{
        allData=results.data.map(r=>({월:r["월"]?.trim(),채널:r["채널"]?.trim(),롱폼:Number(r["롱폼"])||0,숏폼:Number(r["숏폼"])||0,조회수:Number(r["조회수"])||0})).filter(r=>r.월&&r.채널);
        renderCards();
      },
      error:()=>{document.getElementById("main").innerHTML='<div class="no-data">⚠️ 데이터를 불러오지 못했어요.</div>';}
    });
  }
  loadData();
</script>
</body>
</html>
