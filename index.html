<!DOCTYPE html>
<!-- v15 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 채널 성과 현황</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f5; --white: #ffffff; --border: #e8e8e4; --text: #111110; --muted: #999990;
      --up: #1a6b3c; --up-bg: #e8f5ee; --down: #c0392b; --down-bg: #fdecea; --accent: #ff3b30;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
    .header-title { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }
    .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 900px) { .channel-grid { grid-template-columns: 1fr; } }
    .channel-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px 32px; }
    .channel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .channel-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .channel-avatar-fallback { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 900; flex-shrink: 0; }
    .channel-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .metric-block { padding: 22px 0; border-bottom: 1px solid var(--border); }
    .metric-block:last-child { border-bottom: none; padding-bottom: 0; }
    .metric-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .metric-main { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .metric-value { font-size: 30px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; }
    .metric-change-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .metric-change-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .metric-change { font-size: 13px; font-weight: 700; padding: 3px 8px; border-radius: 5px; }
    .metric-change.up { color: var(--up); background: var(--up-bg); }
    .metric-change.down { color: var(--down); background: var(--down-bg); }
    .metric-change.neutral { color: var(--muted); background: #f0f0ee; }
    .upload-badges { display: flex; gap: 6px; margin-bottom: 14px; }
    .badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
    .badge.long { background: #eef2ff; color: #3730a3; }
    .badge.short { background: #fff7ed; color: #c2410c; }
    .mini-chart-wrap { height: 110px; position: relative; }
    .last-updated { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">▶</div>
    <div>
      <div class="header-title">유튜브 채널 성과 현황</div>
      <div class="header-sub">스튜디오지니 · 스밍스 · 쇼숏</div>
    </div>
  </div>
  <span class="last-updated" id="lastUpdated"></span>
</header>
<div style="background:#fff;border-bottom:1px solid #e8e8e4;padding:0 40px;">
  <div style="display:inline-block;padding:14px 0;font-size:13px;font-weight:700;color:#111;border-bottom:2px solid #ff3b30;">최근 3개월 비교</div>
</div>
<main>
  <div class="channel-grid" id="grid"></div>
</main>
<script>
  Chart.register(ChartDataLabels);

  // =============================================
  // 매달 여기만 수정하세요!
  // =============================================
  const DATA = {
    months: ["2월", "3월", "4월"],
    channels: {
      "스튜디오지니": {
        img: "sgn_profile.jpg", bg: "#6366f1", text: "지",
        롱폼:  [93, 52, 35],
        숏폼:  [100, 62, 32],
        조회수: [11310000, 6880000, 9090000],
        수익:  [0, 0, 0],
      },
      "스밍스": {
        img: "sms_profile.jpg", bg: "#f59e0b", text: "스",
        롱폼:  [16, 16, 13],
        숏폼:  [0, 0, 0],
        조회수: [4220000, 3780000, 3240000],
        수익:  [0, 0, 0],
      },
      "쇼숏": {
        img: "ss_profile.jpg", bg: "#10b981", text: "쇼",
        롱폼:  [0, 0, 0],
        숏폼:  [111, 123, 94],
        조회수: [7290000, 3420000, 3620000],
        수익:  [0, 0, 0],
      }
    }
  };
  // =============================================

  const CHANNELS = ["스튜디오지니","스밍스","쇼숏"];
  let charts = {};

  function calcChange(arr) {
    if(arr.length < 2) return null;
    const p = arr[arr.length-2], c = arr[arr.length-1];
    if(!p) return null;
    return ((c-p)/Math.abs(p))*100;
  }
  function changeHtml(pct) {
    if(pct===null) return '<div class="metric-change-wrap"><span class="metric-change-label">전월대비</span><span class="metric-change neutral">-</span></div>';
    const cls=pct>=0?"up":"down", arrow=pct>=0?"▲":"▼";
    return `<div class="metric-change-wrap"><span class="metric-change-label">전월대비</span><span class="metric-change ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</span></div>`;
  }
  function fmtViews(v) { if(v>=100000000)return(v/100000000).toFixed(1)+"억"; if(v>=10000)return Number((v/10000).toFixed(0)).toLocaleString()+"만"; return v.toLocaleString(); }
  function fmtMoney(v) { if(v>=100000000)return(v/100000000).toFixed(1)+"억"; if(v>=10000)return Number((v/10000).toFixed(0)).toLocaleString()+"만"; return v.toLocaleString(); }

  function drawUploadChart(id, totalH, longH, shortH, color) {
    const ctx = document.getElementById(id); if(!ctx) return;
    const lastIdx = totalH.length - 1;
    charts[id] = new Chart(ctx, {
      type: "line",
      data: { labels: DATA.months, datasets: [{ data: totalH, borderColor: color, borderWidth: 2.5, pointBackgroundColor: color, pointRadius: 5, tension: 0.3, fill: false }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 30, left: 28, right: 28, bottom: 4 } },
        plugins: {
          legend: { display: false }, tooltip: { enabled: false },
          datalabels: {
            display: true, color: color, backgroundColor: "rgba(255,255,255,0.9)",
            borderRadius: 4, padding: { top: 2, bottom: 2, left: 5, right: 5 },
            font: { size: 11, weight: "700" }, align: "top", anchor: "end", offset: 4, clamp: true,
            formatter: (v, ctx) => {
              const i = ctx.dataIndex;
              if(i === lastIdx) return String(v);
              return `${v}  (${longH[i]}, ${shortH[i]})`;
            }
          }
        },
        scales: { x: { ticks: { font: { size: 11 }, color: "#bbb" }, grid: { display: false }, border: { display: false } }, y: { display: false, grace: "80%" } }
      }
    });
  }

  function drawChart(id, data, color, fmt) {
    const ctx = document.getElementById(id); if(!ctx) return;
    charts[id] = new Chart(ctx, {
      type: "line",
      data: { labels: DATA.months, datasets: [{ data, borderColor: color, borderWidth: 2.5, pointBackgroundColor: color, pointRadius: 5, tension: 0.3, fill: false }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 30, left: 28, right: 28, bottom: 4 } },
        plugins: {
          legend: { display: false }, tooltip: { enabled: false },
          datalabels: { display: true, color: color, backgroundColor: "rgba(255,255,255,0.9)", borderRadius: 4, padding: { top: 2, bottom: 2, left: 5, right: 5 }, font: { size: 11, weight: "700" }, align: "top", anchor: "end", offset: 4, clamp: true, formatter: fmt }
        },
        scales: { x: { ticks: { font: { size: 11 }, color: "#bbb" }, grid: { display: false }, border: { display: false } }, y: { display: false, grace: "60%" } }
      }
    });
  }

  function render() {
    Object.values(charts).forEach(c=>c.destroy()); charts = {};
    document.getElementById("grid").innerHTML = CHANNELS.map(ch => {
      const d = DATA.channels[ch];
      const totalH = d.롱폼.map((v,i) => v + d.숏폼[i]);
      const uid = ch.replace(/\s/g,"");
      return `<div class="channel-card">
        <div class="channel-header">
          <img class="channel-avatar" src="${d.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
          <div class="channel-avatar-fallback" style="background:${d.bg};display:none;">${d.text}</div>
          <div class="channel-name">${ch}</div>
        </div>
        <div class="metric-block">
          <div class="metric-label">당월 업로드 건수</div>
          <div class="metric-main"><span class="metric-value">${totalH[totalH.length-1]}건</span></div>
          ${changeHtml(calcChange(totalH))}
          <div class="upload-badges"><span class="badge long">롱폼 ${d.롱폼[d.롱폼.length-1]}</span><span class="badge short">숏폼 ${d.숏폼[d.숏폼.length-1]}</span></div>
          <div class="mini-chart-wrap"><canvas id="u-${uid}"></canvas></div>
        </div>
        <div class="metric-block">
          <div class="metric-label">당월 조회수</div>
          <div class="metric-main"><span class="metric-value">${fmtViews(d.조회수[d.조회수.length-1])}</span></div>
          ${changeHtml(calcChange(d.조회수))}
          <div class="mini-chart-wrap"><canvas id="v-${uid}"></canvas></div>
        </div>
        <div class="metric-block">
          <div class="metric-label">당월 수익 (원)</div>
          <div class="metric-main"><span class="metric-value">${fmtMoney(d.수익[d.수익.length-1])}</span></div>
          ${changeHtml(calcChange(d.수익))}
          <div class="mini-chart-wrap"><canvas id="r-${uid}"></canvas></div>
        </div>
      </div>`;
    }).join("");

    requestAnimationFrame(() => {
      CHANNELS.forEach(ch => {
        const d = DATA.channels[ch];
        const uid = ch.replace(/\s/g,"");
        const totalH = d.롱폼.map((v,i) => v + d.숏폼[i]);
        drawUploadChart(`u-${uid}`, totalH, d.롱폼, d.숏폼, "#6366f1");
        drawChart(`v-${uid}`, d.조회수, "#f59e0b", v=>fmtViews(v));
        drawChart(`r-${uid}`, d.수익, "#10b981", v=>fmtMoney(v));
      });
    });
    document.getElementById("lastUpdated").textContent = `마지막 업데이트: ${new Date().toLocaleString("ko-KR",{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})}`;
  }

  render();
</script>
</body>
</html>
